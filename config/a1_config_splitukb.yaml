# bNMF parameters (identical to published arm)
bnmf:
  nreps: 50
  K: 10
  phi: 1.0
  p_threshold:
    EUR: 5e-8
  maf_threshold: 0.01

# LD clumping parameters (identical to published arm)
ld_clump:
  r2: 0.05
  kb: 500
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"

# Trait missingness and proxy variant parameters (identical to published arm)
trait_missingness:
  missingness_threshold: 0.20
  proxy_r2_threshold: 0.80
  proxy_ld_window_kb: 1000
  trait_correlation_threshold: 1.0    # Disabled — keep all traits that pass Bonferroni
  impute_missing: "median"

# HapMap3 SNP restriction
hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"

# GTF for gene mapping (GRCh37)
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# Output directories (separate from published arm)
results_dir: "results/a1_analysis_splitukb"
figures_dir: "results/a1_analysis_splitukb/figures"

# HPC settings
hpc:
  queue: "premium"
  bnmf_walltime: "12:00"
  bnmf_mem: 32000
  bnmf_cores: 1
