# bNMF parameters
bnmf:
  nreps: 50
  K: 10
  phi: 1.0
  p_threshold:
    EUR: 5e-8
    META: 5e-8
    AFR: 1e-5
    EAS: 1e-5
    SAS: 1e-5
    META_CAD: 5e-8
  maf_threshold: 0.01

# LD clumping parameters
ld_clump:
  r2: 0.05
  kb: 500
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"
    META: "reference/1kg_eur/1000G.EUR.QC"
    AFR: "reference/1kg_afr/1000G.AFR.QC"
    EAS: "reference/1kg_eas/1000G.EAS.QC"
    SAS: "reference/1kg_eur/1000G.EUR.QC"
    META_CAD: "reference/1kg_eur/1000G.EUR.QC"
  # Ancestries that get a 2nd LD clump across the pooled union of per-file
  # clumped SNPs (reuses r2/kb above). Per-file clumping only enforces
  # independence within each trait; this enforces it across all traits.
  union_clump_ancestries: [META, META_CAD]

# Trait missingness and proxy variant parameters (Smith et al. 2024)
trait_missingness:
  missingness_threshold: 0.20        # Max fraction of traits a variant can be missing from
  proxy_r2_threshold: 0.80           # Minimum LD r2 for proxy candidates
  proxy_ld_window_kb: 1000           # Window size in kb for proxy search
  trait_correlation_threshold:       # Max Pearson r between traits (per-ancestry)
    EUR: 0.80
    META: 0.80
    AFR: 1.0
    EAS: 1.0
    SAS: 1.0
    META_CAD: 0.80
  impute_missing: "median"           # How to impute remaining missingness: "median" or "zero"

# Allele alignment (optional): orient each universe variant to its CAD/T2D
# risk-raising allele before the non-negative expansion, to prevent mirror
# clusters (e.g. glucose +/- split). Default-safe: behavior is unchanged when
# this block is absent or enabled: false.
allele_alignment:
  enabled: true                      # prototype run
  conflict_rule: "strongest"         # strongest = orient to disease (CAD/T2D) with smallest p per variant
  # Options: strongest | priority_T2D | priority_CAD | first_occurrence

# HapMap3 SNP restriction (optional — set to null to disable)
hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"

# GTF for gene mapping (GRCh37)
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# Output directories
results_dir: "results/a1_analysis"
figures_dir: "results/a1_analysis/figures"

# HPC settings
hpc:
  queue: "express"
  bnmf_walltime: "12:00"
  bnmf_mem: 64000
  bnmf_cores: 1
