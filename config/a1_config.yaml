# A1 Analysis Pipeline Configuration
# -----------------------------------
# bNMF factorization of cardiometabolic GWAS — multi-ancestry (EUR, META, AFR, EAS, SAS).
# Variant universe from CAD + T2D; Z-scores from all available quantitative trait GWAS.
# Correlation filter (|r| >= threshold) handles duplicate-trait pruning automatically.
# Fallback: if an ancestry-specific trait GWAS is missing, use META, then EUR.

ancestries:
  - EUR
  - META
  - AFR
  - EAS
  - SAS
  - META_CAD   # CAD-seeded variant universe (T2D dropped); trait panel = META

# Variant universe selection GWAS (CAD + T2D) — ancestry-matched
ref_gwas:
  EUR:
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.EUR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.processed.txt.gz"
  META:
    # Subset run 2026-05-29: 4 CAD + 5 T2D (largest unique-SNP contributors).
    # Full 36-file list preserved in git history.
    CAD_Aragam2022_META: "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.META.GRCh37.processed.txt.gz"
    CAD_Aragam2022_EUR: "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.EUR.GRCh37.processed.txt.gz"
    CAD_Verma2024_META: "sumstats/harmonized/Verma_Science_2024.CAD.META.GRCh37.processed.txt.gz"
    CAD_Sakaue2021_EAS: "sumstats/harmonized/Sakaue_NatGenet_2021.CAD.EAS.GRCh37.processed.txt.gz"
    T2D_Suzuki2024_META: "sumstats/harmonized/Suzuki_Nature_2024.t2d.META.GRCh37.processed.txt.gz"
    T2D_Vujkovic2020_EUR: "sumstats/harmonized/Vujkovic_NatureGenetics_2020.t2d.EUR.GRCh37.processed.txt.gz"
    T2D_Suzuki2024_EUR: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.processed.txt.gz"
    T2D_FinnGen2018_EUR: "sumstats/harmonized/FinnGen_2018.T2D.EUR.GRCh37.processed.txt.gz"
    T2D_Suzuki2024_EAS: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EAS.GRCh37.processed.txt.gz"
  # CAD-only variant universe: same 4 CAD files as META, no T2D.
  META_CAD:
    CAD_Aragam2022_META: "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.META.GRCh37.processed.txt.gz"
    CAD_Aragam2022_EUR: "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.EUR.GRCh37.processed.txt.gz"
    CAD_Verma2024_META: "sumstats/harmonized/Verma_Science_2024.CAD.META.GRCh37.processed.txt.gz"
    CAD_Sakaue2021_EAS: "sumstats/harmonized/Sakaue_NatGenet_2021.CAD.EAS.GRCh37.processed.txt.gz"
  AFR:
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.AFR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.AFR.GRCh37.txt.gz"
  EAS:
    CAD: "sumstats/harmonized/Verma_Science_2024.CAD.EAS.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EAS.GRCh37.processed.txt.gz"
  SAS:
    CAD: "sumstats/harmonized/Karczewski_NatGenet_2025.CAD.SAS.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Mahajan_NatureGenetics_2022.t2d.SAS.GRCh37.processed.txt.gz"

