# Snakemake pipeline configuration for GWAS harmonization
# -------------------------------------------------------

# Directories (relative to project root)
sumstats_dir: "sumstats"
harmonized_dir: "sumstats/harmonized"
build_check_dir: "sumstats/build_checks"

# Target genome build ("19" = GRCh37, "38" = GRCh38)
preferred_build: "19"

# Number of cores for gwaslab operations (basic_check, liftover)
n_cores: 32

# Ancestries to process
# Files are discovered via glob: sumstats/*.{ancestry}.*
ancestries:
  - EUR
  - AFR
  - META
  - EAS

# Sample size overrides for files missing an N column.
# Key = filename stem up to ancestry (Author_Journal_Year.Trait.Ancestry)
# These are applied when the source file has no N column.
n_overrides:
  "Mishra_Nature_2022.stroke.EUR": 1614080
  "Mishra_Nature_2022.stroke.AFR": 202517
  "Mishra_Nature_2022.stroke.META": 1816597
  "Mishra_Nature_2022.stroke.EAS": 254159

# Files to skip during harmonization (no usable beta/SE data).
# Key = filename stem up to ancestry. Matched as prefix against raw_base.
skip_files:
  - "Chen_NatureComms_2021.ALP.META"
  - "Chen_NatureComms_2021.ALT.META"
  - "Chen_NatCommun_2021.AST.META"
  - "Chen_Cell_2020.MonocyteCount.META"
  - "Chen_NatGenet_2021.FastingGlucose.META"
  - "Chen_NatGenet_2021.FastingInsulin.META"
  - "Ward_NatureComms_2021.ALT.META"
  - "Ward_NatureComms_2021.AST.META"
  - "Downie_Diabetologia_2022.FastingGlucose.META"
  - "Downie_Diabetologia_2022.FastingInsulin.META"

# T2D reference files for allele alignment (static, already harmonized)
t2d_reference:
  EUR: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.txt.gz"
  AFR: "sumstats/harmonized/Suzuki_Nature_2024.t2d.AFR.GRCh37.txt.gz"
  META: "sumstats/harmonized/Suzuki_Nature_2024.t2d.META.GRCh37.processed.txt.gz"
  EAS: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EAS.GRCh37.processed.txt.gz"

# QC output directory
qc_dir: "sumstats/qc"

# -------------------------------------------------------
# bNMF analysis parameters
# -------------------------------------------------------
bnmf:
  nreps: 10
  K: 20
  phi: 1.0
  # P-value thresholds: EUR and META use strict 5e-8; all others use relaxed 1e-5
  p_threshold_strict: 5e-8
  p_threshold_relaxed: 1e-5
  strict_ancestries:
    - EUR
    - META

# -------------------------------------------------------
# LD clumping parameters (for variant QC before bNMF)
# -------------------------------------------------------
ld_clump:
  r2: 0.05           # r-squared threshold (Udler et al. 2018)
  kb: 500            # clumping window in kb
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"
    AFR: "reference/1kg_afr/1000G.AFR.QC"
    META: "reference/1kg_eur/1000G.EUR.QC"   # use EUR for meta-analysis
    EAS: "reference/1kg_eas/1000G.EAS.QC"

# Output directories
results_dir: "results"
figures_dir: "results/figures"
