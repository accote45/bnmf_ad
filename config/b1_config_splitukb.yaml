ancestry:
  admixture_file: "/sc/arion/projects/paul_oreilly/data/Biobanks/CrossBiobank_qc/GeneticDerived_Ancestry/admixture/data/UKB/ukb.5.Q"
  eur_threshold: 0.80
  afr_threshold: 0.60
  eas_threshold: 0.60
  sas_threshold: 0.60
  withdrawn_file: "/sc/arion/projects/paul_oreilly/data/ukb/withdrawn/withdraw18177_398_20240119.txt"

split:
  train_fraction: 0.80
  seed: 47

a1_results:
  w_matrix: "results/a1_analysis_splitukb/EUR/W_matrix_EUR.tsv"
  filtered_variants: "results/a1_analysis_splitukb/EUR/filtered_variants_EUR.tsv"

# Sensitivity arm: EUR-only bNMF universe (config/a1_config.yaml ref_gwas.EUR is a
# single file per trait, so these are single-element lists and union_clump is off).
gwas:
  t2d_files:
    - "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.txt.gz"
  cad_files:
    - "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.EUR.GRCh37.processed.txt.gz"

ld_clump:
  p_threshold: 5e-8
  maf_threshold: 0.001
  r2: 0.05
  kb: 500
  ref_panel: "reference/1kg_eur/1000G.EUR.QC"
  hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"
  union_clump: false
  plink_bin: "/hpc/packages/minerva-centos7/plink/1.90b6.21/plink"

genotypes:
  prefix: "/sc/arion/projects/paul_oreilly/data/Biobanks/UKB/imputed/qced_data/chr{chr}_qced"

phenotypes:
  phenotype_file: "results/a0_analysis/prs_ct/phenotypes_combined.txt"
  covariate_file: "results/a0_analysis/prs_ct/covariates.txt"

exclude_samples: "data/splitukb_gwas_iids.txt"

results_dir: "results/b1_analysis/sensitivity_splitukb"
