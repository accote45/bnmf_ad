# AD bNMF Pipeline Configuration (trans-ancestry / META, v1)
# ----------------------------------------------------------
# Retarget of the cardiometabolic bNMF pipeline to Alzheimer's disease.
# Variant universe (rows) = AD full-cohort top loci (127 GW-significant leads,
#   a trans-ancestry mix: META where available, EUR where best-powered).
# Trait panel (columns) = AD-relevant trans-ancestry (META) quantitative-trait GWAS.
#
# Trans-ancestry framing: loci and trait GWAS are both multi-ancestry, so the
# panel uses the .META. version of every trait for internal consistency. The
# LD reference is EUR 1000G (standard pragmatic choice for META, as in the
# original pipeline's META arm; loci are mostly EUR-powered).

ancestries:
  - META

# ---------------------------------------------------------------------------
# Reference GWAS = the AD variant universe (matrix ROWS).
# Produced by scripts/gwas_processing/convert_ad_loci.R from the 127-loci table.
# ---------------------------------------------------------------------------
ref_gwas:
  META:
    AD: "sumstats/harmonized/AD_PGC3_top127.META.GRCh37.processed.txt.gz"

# ---------------------------------------------------------------------------
# Trait GWAS = matrix COLUMNS. Z-score of each AD lead is pulled from each file.
# v1 = 19 reuse files (.META. versions; symlinked via link_reuse_sumstats.sh).
# ADD new AD-specific traits below as they are harmonized (use .META. files).
# ---------------------------------------------------------------------------
trait_gwas:
  fallback_order: []   # single arm: no fallback

  META:
    # --- Lipid / APOE axis ---
    HDL_Graham2021: "sumstats/harmonized/Graham_Nature_2021.HDL.META.GRCh37.processed.txt.gz"
    LDL_Graham2021: "sumstats/harmonized/Graham_Nature_2021.LDL.META.GRCh37.processed.txt.gz"
    TotalCholesterol_Graham2021: "sumstats/harmonized/Graham_Nature_2021.TotalCholesterol.META.GRCh37.processed.txt.gz"
    Triglycerides_Graham2021: "sumstats/harmonized/Graham_Nature_2021.Triglycerides.META.GRCh37.processed.txt.gz"
    ApoA_Karczewski2025: "sumstats/harmonized/Karczewski_NatureGenetics_2025.ApoA.META.GRCh37.processed.txt.gz"
    ApoB_Karczewski2025: "sumstats/harmonized/Karczewski_NatureGenetics_2025.ApoB.META.GRCh37.processed.txt.gz"

    # --- Immune / inflammatory ---
    CRP_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.CRP.META.GRCh37.processed.txt.gz"
    LymphocyteCount_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.LymphocyteCount.META.GRCh37.processed.txt.gz"
    MonocyteCount_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.MonocyteCount.META.GRCh37.processed.txt.gz"
    NeutrophilCount_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.NeutrophilCount.META.GRCh37.processed.txt.gz"
    WBC_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.WBC.META.GRCh37.processed.txt.gz"
    Eosinophilcount_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.Eosinophilcount.META.GRCh37.processed.txt.gz"

    # --- Metabolic / glycemic ---
    # (FastingInsulin dropped: no META version available. RandomGlucose added instead.)
    T2D_Suzuki2024: "sumstats/harmonized/Suzuki_Nature_2024.t2d.META.GRCh37.processed.txt.gz"
    FastingGlucose_Downie2022: "sumstats/harmonized/Downie_Diabetologia_2022.FastingGlucose.META.GRCh37.processed.txt.gz"
    RandomGlucose_Lagou2023: "sumstats/harmonized/Lagou_NatGenet_2023.RandomGlucose.META.GRCh37.processed.txt.gz"
    Hba1c_Chen2021: "sumstats/harmonized/Chen_NatureGenetics_2021.Hba1c.META.GRCh37.processed.txt.gz"
    BMI_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.BMI.META.GRCh37.processed.txt.gz"

    # --- Vascular ---
    SBP_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.SBP.META.GRCh37.processed.txt.gz"
    DBP_Karczewski2025: "sumstats/harmonized/Karczewski_NatGenet_2025.DBP.META.GRCh37.processed.txt.gz"

    # --- NEW AD-specific traits (add as harmonized; use .META. files) ---------
    # Fluid biomarkers, neuroimaging, cognition, other neurodegeneration.
    # "TraitName_AuthorYear: <path>", e.g.:
    # HippocampalVolume_Hibar2017: "sumstats/harmonized/Hibar_NatComms_2017.HippocampalVolume.META.GRCh37.processed.txt.gz"
    # WMH_Sargurupremraj2020:      "sumstats/harmonized/Sargurupremraj_NatComms_2020.WMH.META.GRCh37.processed.txt.gz"
    # CognitiveFunction_Davies2018:"sumstats/harmonized/Davies_NatComms_2018.CognitiveFunction.META.GRCh37.processed.txt.gz"
    # EducationalAttainment_Okbay2022: "..."
    # Parkinsons_Nalls2019:        "..."
    # Depression_Howard2019:       "..."
    # CSF_Abeta42_Deming2017:      "..."
    # --------------------------------------------------------------------------

# bNMF parameters
bnmf:
  nreps: 50
  K: 10          # initial K; bNMF prunes toward the supported rank. Tune after v1.
  phi: 1.0
  p_threshold:
    META: 5e-8   # all 127 leads are GW-significant
  maf_threshold: 0.01

# LD clumping. Leads are already independent -> harmless idempotent pass.
# EUR 1000G panel is the standard LD approximation for a trans-ancestry set.
ld_clump:
  r2: 0.05
  kb: 500
  ref_panel:
    META: "reference/1kg_eur/1000G.EUR.QC"
  union_clump_ancestries: []   # one pre-clumped reference file -> no union clump

# Trait missingness + proxy (Smith et al. 2024)
trait_missingness:
  missingness_threshold: 0.20
  proxy_r2_threshold: 0.80
  proxy_ld_window_kb: 1000
  trait_correlation_threshold:
    META: 0.80
  impute_missing: "median"

# Allele alignment: single reference => orient each variant to the AD-risk allele.
# No two-disease conflict, so first_occurrence (= align to the sole ref GWAS) is correct.
allele_alignment:
  enabled: true
  conflict_rule: "first_occurrence"

# HapMap3 restriction DISABLED so we keep all 127 AD leads (some may be absent
# from HapMap3). Set to a path to re-enable.
hapmap3_snp_file: null

# GTF for gene mapping (GRCh37) — used by downstream visualization/gene mapping.
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# Output directories
results_dir: "results/ad_analysis"
figures_dir: "results/ad_analysis/figures"

# HPC settings
hpc:
  queue: "express"
  bnmf_walltime: "12:00"
  bnmf_mem: 64000
  bnmf_cores: 1
