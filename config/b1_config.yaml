ancestry:
  admixture_file: "/sc/arion/projects/paul_oreilly/data/Biobanks/CrossBiobank_qc/GeneticDerived_Ancestry/admixture/data/UKB/ukb.5.Q"
  eur_threshold: 0.80
  afr_threshold: 0.60
  eas_threshold: 0.60
  sas_threshold: 0.60
  withdrawn_file: "/sc/arion/projects/paul_oreilly/data/ukb/withdrawn/withdraw18177_398_20240119.txt"

split:
  train_fraction: 0.80
  seed: 47

a1_results:
  w_matrix: "results/a1_analysis/META/W_matrix_META.tsv"
  filtered_variants: "results/a1_analysis/META/filtered_variants_META.tsv"

# Input GWAS for PRS BETAs + genome-wide PRS variant selection. These mirror the
# bNMF META variant universe (config/a1_config.yaml ref_gwas.META) so the cluster
# PRS, the genome-wide PRS comparator, and the bNMF clusters all draw from the same
# GWAS. Per-variant BETA = strongest-signal (min-P) effect across the trait's list.
gwas:
  t2d_files:
    - "sumstats/harmonized/Suzuki_Nature_2024.t2d.META.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Vujkovic_NatureGenetics_2020.t2d.EUR.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/FinnGen_2018.T2D.EUR.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Suzuki_Nature_2024.t2d.EAS.GRCh37.processed.txt.gz"
  cad_files:
    - "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.META.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Aragam_NatureGenetics_2022.CAD.EUR.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Verma_Science_2024.CAD.META.GRCh37.processed.txt.gz"
    - "sumstats/harmonized/Sakaue_NatGenet_2021.CAD.EAS.GRCh37.processed.txt.gz"

# LD clumping / variant-selection parameters for the genome-wide PRS comparator,
# matching the bNMF pipeline (config/a1_config.yaml ld_clump + bnmf.p_threshold.META).
# Used by 01b_compute_genomewide_prs.R via prep_bnmf.R::qc_variants_multi().
ld_clump:
  p_threshold: 5e-8
  maf_threshold: 0.001
  r2: 0.05
  kb: 500
  ref_panel: "reference/1kg_eur/1000G.EUR.QC"
  hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"
  union_clump: true
  plink_bin: "/hpc/packages/minerva-centos7/plink/1.90b6.21/plink"

genotypes:
  prefix: "/sc/arion/projects/paul_oreilly/data/Biobanks/UKB/imputed/qced_data/chr{chr}_qced"

phenotypes:
  phenotype_file: "results/a0_analysis/prs_ct/phenotypes_combined.txt"
  covariate_file: "results/a0_analysis/prs_ct/covariates.txt"

cluster_labels:
  K1: "Lpa"
  K2: "Adiponectin"
  K3: "Platelet"
  K4: "SHBG"
  K5: "Blood Pressure-Stature"
  K6: "Metabolic"
  K7: "Triglycerides-HDL"
  K8: "ALP-LDL"
  K9: "Obesity"
  K10: "Glycemic"

results_dir: "results/b1_analysis"
