# A1 Analysis Pipeline Configuration — Core Published Arm
# -------------------------------------------------------
# bNMF factorization using only the 30 EUR published GWAS traits that
# have a counterpart in the split-UKB set. All GWAS sources per trait
# are included; the correlation filter (|r| >= 0.80) prunes duplicates.

ancestries:
  - EUR

# Variant universe selection GWAS (CAD + T2D) — same as all arms
ref_gwas:
  EUR:
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.EUR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.processed.txt.gz"

