    HR_Verma2024: "sumstats/harmonized/Verma_Science_2024.HR.EUR.GRCh37.processed.txt.gz"

# bNMF parameters (identical to full EUR arm)
bnmf:
  nreps: 50
  K: 10
  phi: 1.0
  p_threshold:
    EUR: 5e-8
  maf_threshold: 0.01

# LD clumping parameters (identical to full EUR arm)
ld_clump:
  r2: 0.05
  kb: 500
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"

# Trait missingness and proxy variant parameters
trait_missingness:
  missingness_threshold: 0.20
  proxy_r2_threshold: 0.80
  proxy_ld_window_kb: 1000
  trait_correlation_threshold: 0.80  # Prune correlated multi-source traits
  impute_missing: "median"

# HapMap3 SNP restriction
hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"

# GTF for gene mapping (GRCh37)
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# Output directories (separate from full EUR arm)
results_dir: "results/a1_analysis_core_published"
figures_dir: "results/a1_analysis_core_published/figures"

# HPC settings
hpc:
  queue: "premium"
  bnmf_walltime: "12:00"
  bnmf_mem: 32000
  bnmf_cores: 1
