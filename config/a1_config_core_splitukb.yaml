# A1 Analysis Pipeline Configuration — Core Split-UKB Arm
# --------------------------------------------------------
# bNMF factorization using only the 30 split-UKB traits that have a
# counterpart in the EUR published GWAS set.

ancestries:
  - EUR

# Variant universe selection GWAS (CAD + T2D) — same as all arms
ref_gwas:
  EUR:
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.EUR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.txt.gz"

# 30 shared-trait phenotypes (one GWAS each from 50% UKB split)
trait_gwas:
  EUR:
    BMI: "sumstats/harmonized_splitukb/splitUKB.21001.BMI.EUR.GRCh37.processed.txt.gz"
    Height: "sumstats/harmonized_splitukb/splitUKB.50.Height.EUR.GRCh37.processed.txt.gz"
    WaistCircum: "sumstats/harmonized_splitukb/splitUKB.48.WaistCircum.EUR.GRCh37.processed.txt.gz"
    BMR: "sumstats/harmonized_splitukb/splitUKB.23105.BMR.EUR.GRCh37.processed.txt.gz"
    Triglycerides: "sumstats/harmonized_splitukb/splitUKB.30870.Triglycerides.EUR.GRCh37.processed.txt.gz"
    Cholesterol: "sumstats/harmonized_splitukb/splitUKB.30690.Cholesterol.EUR.GRCh37.processed.txt.gz"
    ApolipoproteinA: "sumstats/harmonized_splitukb/splitUKB.30630.ApolipoproteinA.EUR.GRCh37.processed.txt.gz"
    GlycatedHaem: "sumstats/harmonized_splitukb/splitUKB.30750.GlycatedHaem.EUR.GRCh37.processed.txt.gz"
    Glucose: "sumstats/harmonized_splitukb/splitUKB.30740.Glucose.EUR.GRCh37.processed.txt.gz"
    Creatinine: "sumstats/harmonized_splitukb/splitUKB.30700.Creatinine.EUR.GRCh37.processed.txt.gz"
    Urea: "sumstats/harmonized_splitukb/splitUKB.30670.Urea.EUR.GRCh37.processed.txt.gz"
    Phosphate: "sumstats/harmonized_splitukb/splitUKB.30810.Phosphate.EUR.GRCh37.processed.txt.gz"
    Calcium: "sumstats/harmonized_splitukb/splitUKB.30680.Calcium.EUR.GRCh37.processed.txt.gz"
    VitaminD: "sumstats/harmonized_splitukb/splitUKB.30890.VitaminD.EUR.GRCh37.processed.txt.gz"
    TotalProtein: "sumstats/harmonized_splitukb/splitUKB.30860.TotalProtein.EUR.GRCh37.processed.txt.gz"
    SHBG: "sumstats/harmonized_splitukb/splitUKB.30830.SHBG.EUR.GRCh37.processed.txt.gz"
    Testosterone: "sumstats/harmonized_splitukb/splitUKB.30850.Testosterone.EUR.GRCh37.processed.txt.gz"
    IGF1: "sumstats/harmonized_splitukb/splitUKB.30770.IGF1.EUR.GRCh37.processed.txt.gz"
    HaemoglobinConc: "sumstats/harmonized_splitukb/splitUKB.30020.HaemoglobinConc.EUR.GRCh37.processed.txt.gz"
    WBCs: "sumstats/harmonized_splitukb/splitUKB.30000.WBCs.EUR.GRCh37.processed.txt.gz"
    RBCs: "sumstats/harmonized_splitukb/splitUKB.30010.RBCs.EUR.GRCh37.processed.txt.gz"
    MeanCPVol: "sumstats/harmonized_splitukb/splitUKB.30040.MeanCPVol.EUR.GRCh37.processed.txt.gz"
    Lymphocytes: "sumstats/harmonized_splitukb/splitUKB.30120.Lymphocytes.EUR.GRCh37.processed.txt.gz"
    Monocytes: "sumstats/harmonized_splitukb/splitUKB.30130.Monocytes.EUR.GRCh37.processed.txt.gz"
    Neutrophils: "sumstats/harmonized_splitukb/splitUKB.30140.Neutrophils.EUR.GRCh37.processed.txt.gz"
    Eosinophils: "sumstats/harmonized_splitukb/splitUKB.30150.Eosinophils.EUR.GRCh37.processed.txt.gz"
    Reticulocytes: "sumstats/harmonized_splitukb/splitUKB.30250.Reticulocytes.EUR.GRCh37.processed.txt.gz"
    MeanRTVol: "sumstats/harmonized_splitukb/splitUKB.30260.MeanRTVol.EUR.GRCh37.processed.txt.gz"
    RBCDistWidth: "sumstats/harmonized_splitukb/splitUKB.30070.RBCDistWidth.EUR.GRCh37.processed.txt.gz"
    PulseRate: "sumstats/harmonized_splitukb/splitUKB.4194.PulseRate.EUR.GRCh37.processed.txt.gz"

# bNMF parameters (identical to all arms)
bnmf:
  nreps: 50
  K: 10
  phi: 1.0
  p_threshold:
    EUR: 5e-8
  maf_threshold: 0.01

# LD clumping parameters (identical to all arms)
ld_clump:
  r2: 0.05
  kb: 500
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"

# Trait missingness and proxy variant parameters
trait_missingness:
  missingness_threshold: 0.20
  proxy_r2_threshold: 0.80
  proxy_ld_window_kb: 1000
  trait_correlation_threshold: 1.0    # Disabled — one GWAS per trait
  impute_missing: "median"

# HapMap3 SNP restriction
hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"

# GTF for gene mapping (GRCh37)
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# Output directories (separate from full split-UKB arm)
results_dir: "results/a1_analysis_core_splitukb"
figures_dir: "results/a1_analysis_core_splitukb/figures"

# HPC settings
hpc:
  queue: "premium"
  bnmf_walltime: "12:00"
  bnmf_mem: 32000
  bnmf_cores: 1
