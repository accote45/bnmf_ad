# C1.1 Empiric Ancestry Difference Test — DRY RUN Configuration
# ---------------------------------------------------------------
# Reduced settings for testing the pipeline end-to-end.
# Key changes from c1_config.yaml:
#   n_subsamples: 10 -> 2
#   nreps: 100 -> 5
#   K: 20 -> 10

# UKB data paths
ukb:
  geno_prefix: "/sc/arion/projects/paul_oreilly/data/Biobanks/UKB/imputed/qced_data/chr"
  geno_type: "per_chromosome"   # chr1..chr22 plink binary files
  admixture_file: "/sc/arion/projects/paul_oreilly/data/Biobanks/CrossBiobank_qc/GeneticDerived_Ancestry/admixture/data/UKB/ukb.5.Q"
  afr_threshold: 0.60
  eur_threshold: 0.80
  db_path: "/sc/arion/projects/ukb18177_oreilly/ukb/phenotype/ukb18177-all.db"
  covar_path: "/sc/arion/projects/ukb18177_oreilly/ukb/phenotype/ukb18177.covar"
  phenotype_file: "results/c1_ancestry_test/phenotypes.txt"
  covariate_file: "results/c1_ancestry_test/covariates.txt"

# Subsampling parameters (REDUCED)
subsampling:
  n_subsamples: 2       # was 10
  seed: 12345

# GWAS parameters
gwas:
  traits:
    - "LDL"
    - "glucose"
    - "BMI"
  covariates: "age,sex,PC1,PC2,PC3,PC4,PC5,PC6,PC7,PC8,PC9,PC10"
  plink_bin: "plink2"

# bNMF parameters (REDUCED)
bnmf:
  nreps: 20             # was 100, increased from 5
  K: 10                 # was 20
  phi: 1.0
  p_threshold_eur: 1e-5
  p_threshold_afr: 1e-5
  maf_threshold: 0.01

# Published reference GWAS for Z-score matrix (all 21 traits)
ref_gwas:
  EUR:
    # --- Original 7 traits (updated to .processed.txt.gz where available) ---
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.EUR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.EUR.GRCh37.txt.gz"
    LDL: "sumstats/harmonized/Graham_Nature_2021.LDL.EUR.GRCh37.processed.txt.gz"
    BMI: "sumstats/harmonized/Huang_NatureComms_2022.BMI.EUR.GRCh37.processed.txt.gz"
    SBP: "sumstats/harmonized/Keaton_NatureGenetics_2024.SBP.EUR.GRCh37.processed.txt.gz"
    Stroke: "sumstats/harmonized/Mishra_Nature_2022.stroke.EUR.GRCh37.processed.txt.gz"
    HF: "sumstats/harmonized/Henry_NatureGenetics_2025.HF.EUR.GRCh37.processed.txt.gz"
    # --- Lipids ---
    HDL: "sumstats/harmonized/Graham_Nature_2021.HDL.EUR.GRCh37.processed.txt.gz"
    TotalCholesterol: "sumstats/harmonized/Graham_Nature_2021.TotalCholesterol.EUR.GRCh37.processed.txt.gz"
    Triglycerides: "sumstats/harmonized/Graham_Nature_2021.Triglycerides.EUR.GRCh37.processed.txt.gz"
    ApoA: "sumstats/harmonized/Karczewski_NatureGenetics_2025.ApoA.EUR.GRCh37.processed.txt.gz"
    ApoB: "sumstats/harmonized/Karczewski_NatureGenetics_2025.ApoB.EUR.GRCh37.processed.txt.gz"
    # --- Glycemic ---
    FastingGlucose: "sumstats/harmonized/Chen_NatGenet_2021.FastingGlucose.EUR.GRCh37.processed.txt.gz"
    FastingInsulin: "sumstats/harmonized/Chen_NatGenet_2021.FastingInsulin.EUR.GRCh37.processed.txt.gz"
    # --- Liver / inflammatory ---
    ALT: "sumstats/harmonized/Pazoki_NatureComms_2021.ALT.EUR.GRCh37.processed.txt.gz"
    AST: "sumstats/harmonized/Sinnott-Armstrong_NatGenet_2021.AST.EUR.GRCh37.processed.txt.gz"
    Bilirubin: "sumstats/harmonized/NealeLab_UKBRound2_2018.Bilirubin.EUR.GRCh37.processed.txt.gz"
    GGT: "sumstats/harmonized/Pazoki_NatCommun_2021.GGT.EUR.GRCh37.processed.txt.gz"
    # --- Blood pressure ---
    DBP: "sumstats/harmonized/Evangelou_NatGenet_2018.DBP.EUR.GRCh37.processed.txt.gz"
    # --- Renal / hematologic ---
    uACR: "sumstats/harmonized/Teumer_NatCommun_2019.uACR.EUR.GRCh37.processed.txt.gz"
    MonocyteCount: "sumstats/harmonized/Vuckovic_Cell_2020.MonocyteCount.EUR.GRCh37.processed.txt.gz"
  AFR:
    # --- Original 7 traits (updated to .processed.txt.gz where available) ---
    CAD: "sumstats/harmonized/Tcheandjieu_NatureMed_2023.CAD.AFR.GRCh37.processed.txt.gz"
    T2D: "sumstats/harmonized/Suzuki_Nature_2024.t2d.AFR.GRCh37.txt.gz"
    LDL: "sumstats/harmonized/Graham_Nature_2021.LDL.AFR.GRCh37.processed.txt.gz"
    BMI: "sumstats/harmonized/Huang_NatureComms_2022.BMI.AFR.GRCh37.processed.txt.gz"
    SBP: "sumstats/harmonized/Singh_NatureComms_2023.SBP.AFR.GRCh37.processed.txt.gz"
    Stroke: "sumstats/harmonized/Mishra_Nature_2022.stroke.AFR.GRCh37.processed.txt.gz"
    HF: "sumstats/harmonized/Joseph_NatureComms_2022.HF.AFR.GRCh37.processed.txt.gz"
    # --- Lipids ---
    HDL: "sumstats/harmonized/Graham_Nature_2021.HDL.AFR.GRCh37.processed.txt.gz"
    TotalCholesterol: "sumstats/harmonized/Graham_Nature_2021.TotalCholesterol.AFR.GRCh37.processed.txt.gz"
    Triglycerides: "sumstats/harmonized/Graham_Nature_2021.Triglycerides.AFR.GRCh37.processed.txt.gz"
    ApoA: "sumstats/harmonized/Zoodsma_NatureGenetics_2025.ApoA.AFR.GRCh37.processed.txt.gz"
    ApoB: "sumstats/harmonized/Zoodsma_NatureGenetics_2025.ApoB.AFR.GRCh37.processed.txt.gz"
    # --- Glycemic ---
    FastingGlucose: "sumstats/harmonized/Chen_NatGenet_2021.FastingGlucose.AFR.GRCh37.processed.txt.gz"
    FastingInsulin: "sumstats/harmonized/Chen_NatGenet_2021.FastingInsulin.AFR.GRCh37.processed.txt.gz"
    # --- Liver / inflammatory ---
    ALT: "sumstats/harmonized/Karczewski_NatureGenetics_2025.ALT.AFR.GRCh37.processed.txt.gz"
    AST: "sumstats/harmonized/Gurdasani_Cell_2019.AST.AFR.GRCh37.processed.txt.gz"
    Bilirubin: "sumstats/harmonized/Gurdasani_Cell_2019.Bilirubin.AFR.GRCh37.processed.txt.gz"
    GGT: "sumstats/harmonized/Gurdasani_Cell_2019.GGT.AFR.GRCh37.processed.txt.gz"
    # --- Blood pressure ---
    DBP: "sumstats/harmonized/Gurdasani_Cell_2019.DBP.AFR.GRCh37.processed.txt.gz"
    # --- Renal / hematologic ---
    uACR: "sumstats/harmonized/Teumer_NatCommun_2019.uACR.AFR.GRCh37.processed.txt.gz"
    MonocyteCount: "sumstats/harmonized/Chen_Cell_2020.MonocyteCount.AFR.GRCh37.processed.txt.gz"

# LD clumping parameters (same as main pipeline)
ld_clump:
  r2: 0.1
  kb: 500
  ref_panel:
    EUR: "reference/1kg_eur/1000G.EUR.QC"
    AFR: "reference/1kg_afr/1000G.AFR.QC"

# Jaccard analysis parameters
jaccard:
  membership_method: "top_n"
  top_n: 500
  weight_threshold: null
  gene_flank_kb: 50            # flanking window (kb) for SNP-to-gene mapping
  pathway_gmt: "/sc/arion/projects/paul_oreilly/data/Functional_Genomics/pathway_databases/msigdb/qced_data/c2.all.v2023.2.Hs.symbols.gmt_filtered.txt"
  pathway_fdr: 0.05

# GTF for gene mapping (GRCh37)
gtf_path: "/sc/arion/projects/paul_oreilly/lab/kestir01/Homo_sapiens.GRCh37.75.gtf"

# HapMap3 SNP restriction (optional — reduces ancestry-specific SNP discovery bias)
hapmap3_snp_file: "reference/hapmap3/hapmap3_snps.tsv"

# Output directories
results_dir: "results/c1_ancestry_test"
figures_dir: "results/c1_ancestry_test/figures"

# HPC settings (REDUCED walltimes)
hpc:
  queue: "express"
  gwas_walltime: "2:00"
  gwas_mem: 16000
  gwas_cores: 4
  bnmf_walltime: "4:00"
  bnmf_mem: 32000
  bnmf_cores: 1
